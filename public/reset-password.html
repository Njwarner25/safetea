<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SafeTea</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #1A1A2E; color: #F0D0C0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 420px; width: 90%; padding: 24px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo span { font-size: 28px; font-weight: 800; color: #E8A0B5; }
        .card { background: #22223A; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 32px 28px; }
        .card h2 { color: #fff; font-size: 20px; margin-bottom: 8px; text-align: center; }
        .card p { color: #8080A0; font-size: 14px; margin-bottom: 20px; text-align: center; line-height: 1.5; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #8080A0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; background: #141428; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 14px 16px; color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #E8A0B5; }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #E8A0B5, #D4768E); color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 8px; }
        .btn-submit:hover { box-shadow: 0 4px 15px rgba(232,160,181,0.3); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg { text-align: center; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
        .msg-success { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .msg-error { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #E8A0B5; text-decoration: none; font-size: 14px; }
        .back-link a:hover { text-decoration: underline; }
        .password-req { font-size: 12px; color: #8080A0; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span>SafeTea</span></div>
        <div class="card">
            <h2>Reset Your Password</h2>
            <p>Enter your new password below.</p>

            <div id="msg-success" class="msg msg-success"></div>
            <div id="msg-error" class="msg msg-error"></div>

            <form id="reset-form" onsubmit="handleReset(event)">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" placeholder="Enter new password" required minlength="8">
                    <div class="password-req">Must be at least 8 characters</div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn"><i class="fas fa-lock"></i> Reset Password</button>
            </form>
        </div>
        <div class="back-link"><a href="/login"><i class="fas fa-arrow-left"></i> Back to Login</a></div>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');

        if (!token) {
            document.getElementById('reset-form').style.display = 'none';
            showMessage('error', 'Invalid reset link. Please request a new one from the login page.');
        }

        function handleReset(e) {
            e.preventDefault();
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirm-password').value;
            var btn = document.getElementById('submit-btn');

            hideMessages();

            if (password.length < 8) {
                showMessage('error', 'Password must be at least 8 characters.');
                return;
            }

            if (password !== confirm) {
                showMessage('error', 'Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

            fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, password: password })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';

                if (data.success) {
                    showMessage('success', data.message + ' Redirecting to login...');
                    document.getElementById('reset-form').style.display = 'none';
                    setTimeout(function() { window.location.href = '/login'; }, 3000);
                } else {
                    showMessage('error', data.error || 'Reset failed. Please try again.');
                }
            })
            .catch(function() {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
                showMessage('error', 'Network error. Please try again.');
            });
        }

        function showMessage(type, msg) {
            hideMessages();
            var el = document.getElementById('msg-' + type);
            if (el) { el.textContent = msg; el.style.display = 'block'; }
        }

        function hideMessages() {
            document.getElementById('msg-success').style.display = 'none';
            document.getElementById('msg-error').style.display = 'none';
        }
    </script>
</body>
</html>
