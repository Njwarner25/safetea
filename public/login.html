<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <!-- Mobile / PWA / native shell branding -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#E8A0B5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SafeTea">
  <meta name="application-name" content="SafeTea">
  <meta name="format-detection" content="telephone=no">
    <title>Log In - SafeTea</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
            font-family: 'Inter', sans-serif;
      background: #1A1A2E;
      color: #F0D0C0;
            min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
}
    .auth-container {
            width: 100%;
      max-width: 460px;
      padding: 20px;
}
    .auth-logo {
            text-align: center;
      margin-bottom: 40px;
}
    .auth-logo a {
            text-decoration: none;
      display: inline-block;
}
    .auth-logo img { height: 48px; width: auto; }
          .auth-card {
            background: #22223A;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px;
}
    .auth-card h1 {
            font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
      }
    .auth-card p.subtitle {
      color: #8080A0;
      margin-bottom: 30px;
      font-size: 14px;
      }
    .form-group {
            margin-bottom: 20px;
}
    .form-group label {
            display: block;
      font-size: 13px;
      font-weight: 500;
      color: #8080A0;
            margin-bottom: 8px;
}
    .form-group input, .form-group select {
            width: 100%;
      padding: 14px 16px;
      background: #141428;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #fff;
            font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
      outline: none;
}
    .form-group input:focus, .form-group select:focus {
            border-color: #E8A0B5;
      }
          .form-group input::placeholder { color: #555; }
    .form-group .input-icon {
            position: relative;
}
    .form-group .input-icon i {
            position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-size: 14px;
}
    .form-group .input-icon input {
            padding-left: 44px;
}
    .form-row {
            display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
}
    .btn-primary {
            width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #E8A0B5, #D4768E);
              color: #fff;
              border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      margin-top: 10px;
}
    .btn-primary:hover {
            transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(232,160,181,0.3);
    }
    .btn-primary:disabled {
            opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .auth-footer {
            text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #8080A0;
}
    .auth-footer a {
            color: #E8A0B5;
            text-decoration: none;
      font-weight: 500;
}
    .auth-footer a:hover { text-decoration: underline; }
    .error-message {
            background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      color: #e74c3c;
            padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
}
    .success-message {
            background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.3);
      color: #2ecc71;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
}
    .tab-switch {
            display: flex;
      background: #141428;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 30px;
    }
    .tab-switch button {
            flex: 1;
      padding: 12px;
      border: none;
      background: none;
      color: #8080A0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
}
    .tab-switch button.active {
      background: #E8A0B5;
            color: #fff;
            }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .password-toggle {
            position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 14px;
}
    .password-toggle:hover { color: #8080A0; }
    .divider {
            display: flex;
      align-items: center;
      margin: 24px 0;
      color: #555;
      font-size: 12px;
    }
    .divider::before, .divider::after {
            content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
}
    .divider span { padding: 0 16px; }
    .back-link {
            text-align: center;
      margin-top: 20px;
}
    .back-link a {
            color: #8080A0;
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
}
    .back-link a:hover { color: #F0D0C0; }
    .spinner {
            display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
              border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
          <link rel="stylesheet" href="/mobile-viewport-lock.css">
</head>
      <body>
        <div class="auth-container">
          <div class="auth-logo">
            <a href="/">
              <img src="/logo.png" alt="SafeTea">
            </a>
          </div>

          <div class="auth-card">
            <div class="tab-switch">
              <button class="active" onclick="switchTab('login')"><i class="fas fa-envelope"></i> Log In</button>
              <button onclick="switchTab('register')">Sign Up</button>
            </div>

            <div id="error-msg" class="error-message"></div>
            <div id="success-msg" class="success-message"></div>

            <!-- LOGIN FORM -->
            <div id="login-form" class="form-section active">
              <h1>Welcome back</h1>
              <p class="subtitle">Log in to access your SafeTea community</p>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <div class="input-icon">
              <i class="fas fa-envelope"></i>
              <input type="email" id="login-email" placeholder="Enter your email" required>
                  </div>
                </div>

                <div class="form-group">
                  <label>Password</label>
                  <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)">
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>

                <button type="submit" class="btn-primary" id="login-btn">
                  <i class="fas fa-arrow-right"></i> Log In
          </button>
                <div style="text-align:center;margin-top:12px">
                  <a href="#" onclick="showForgotPassword();return false" style="color:#E8A0B5;font-size:13px;text-decoration:none">Forgot password?</a>
                </div>
              </form>
            </div>

            <!-- FORGOT PASSWORD FORM -->
            <div id="forgot-form" class="form-section" style="display:none">
              <h1>Reset Password</h1>
              <p class="subtitle">Enter your email and we'll send you a reset link</p>
              <form onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                  <label for="forgot-email"><i class="fas fa-envelope"></i> Email</label>
                  <input type="email" id="forgot-email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn-primary" id="forgot-btn">
                  <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
                <div style="text-align:center;margin-top:12px">
                  <a href="#" onclick="hideForgotPassword();return false" style="color:#E8A0B5;font-size:13px;text-decoration:none"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
              </form>
            </div>

            <!-- REGISTER FORM -->
            <div id="register-form" class="form-section">
              <h1>Join SafeTea</h1>
              <p class="subtitle">Create your account and join a safer dating community</p>

        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Display Name</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input type="text" id="reg-name" placeholder="How you'll appear to others" required minlength="2">
                  </div>
                </div>

                <div class="form-group">
                  <label>Email</label>
                  <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="reg-email" placeholder="Your email address" required>
                  </div>
                </div>

                <div class="form-group">
                  <label>Password</label>
                  <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Min 8 characters" required minlength="8">
                    <button type="button" class="password-toggle" onclick="togglePassword('reg-password', this)">
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label>City</label>
                    <select id="reg-city" required style="width:100%;padding:12px 16px;background:#22223A;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none;appearance:none;cursor:pointer">
                      <option value="" disabled selected style="color:#8080A0">Select your city</option>
                      <option value="Los Angeles">Los Angeles</option>
                      <option value="Miami">Miami</option>
                      <option value="Dallas">Dallas</option>
                      <option value="" disabled>────────────</option>
                      <option value="Atlanta">Atlanta</option>
                      <option value="Boston">Boston</option>
                      <option value="Chicago">Chicago</option>
                      <option value="Houston">Houston</option>
                      <option value="New York">New York</option>
                      <option value="" disabled>────────────</option>
                      <option value="other">My city isn't listed</option>
                    </select>
                    <div id="city-request-form" style="display:none;margin-top:8px">
                      <input type="email" id="city-request-email" placeholder="Your email — we'll notify you when we expand" style="width:100%;padding:10px 14px;background:#22223A;border:1px solid rgba(232,160,181,0.3);border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;outline:none">
                      <button type="button" onclick="submitCityRequest()" style="margin-top:6px;background:#E8A0B5;color:#1A1A2E;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Request My City</button>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>State</label>
                    <select id="reg-state" required style="width:100%;padding:12px 16px;background:#22223A;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none;appearance:none;cursor:pointer">
                      <option value="" disabled selected style="color:#8080A0">State</option>
                      <option value="IL">IL</option>
                      <option value="TX">TX</option>
                      <option value="GA">GA</option>
                      <option value="FL">FL</option>
                      <option value="CA">CA</option>
                      <option value="MA">MA</option>
                      <option value="NY">NY</option>
                    </select>
                  </div>
                </div>

                <button type="submit" class="btn-primary" id="register-btn">
                  <img src="/images/safetea-logo.svg" alt="" style="height:18px"> Create Account
          </button>
              </form>
            </div>
          </div>

          <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Back to SafeTea</a>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    // Auto-select state when city is chosen
    const cityStateMap = { 'Chicago': 'IL', 'Dallas': 'TX', 'Houston': 'TX', 'Atlanta': 'GA', 'Miami': 'FL', 'Los Angeles': 'CA', 'Boston': 'MA', 'New York': 'NY' };
    document.getElementById('reg-city').addEventListener('change', function() {
      const st = cityStateMap[this.value];
      if (st) document.getElementById('reg-state').value = st;
      document.getElementById('city-request-form').style.display = this.value === 'other' ? 'block' : 'none';
    });
    function submitCityRequest() {
      const email = document.getElementById('city-request-email').value.trim();
      if (!email || !email.includes('@')) { alert('Please enter a valid email.'); return; }
      alert('Thanks! We\'ll notify you at ' + email + ' when SafeTea expands to your city.');
      document.getElementById('city-request-form').style.display = 'none';
      document.getElementById('reg-city').value = '';
    }
    window.submitCityRequest = submitCityRequest;

    // Check if already logged in
    if (localStorage.getItem('safetea_token')) {
      window.location.href = '/dashboard.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-switch button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));

      const buttons = document.querySelectorAll('.tab-switch button');
      if (tab === 'login') {
        buttons[0].classList.add('active');
        document.getElementById('login-form').classList.add('active');
      } else {
        buttons[1].classList.add('active');
        document.getElementById('register-form').classList.add('active');
      }
      hideMessages();
    }

    function showError(msg) {
            const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
            const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
    }

    function hideMessages() {
            document.getElementById('error-msg').style.display = 'none';
      document.getElementById('success-msg').style.display = 'none';
    }

    // Capture referral code from URL
    (function() {
      var params = new URLSearchParams(window.location.search);
      var ref = params.get('ref');
      if (ref) localStorage.setItem('safetea_referral_code', ref);
    })();

    function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Logging in...';
      hideMessages();

      try {
        const res = await fetch(API_BASE + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const ct = res.headers.get('content-type') || '';
        if (ct.indexOf('application/json') === -1) {
          throw new Error('Server error — please try again in a moment');
        }

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        localStorage.setItem('safetea_token', data.token);
        localStorage.setItem('safetea_user', JSON.stringify(data.user));

        showSuccess('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right"></i> Log In';
      }
}

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const display_name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const city = document.getElementById('reg-city').value;
      const state = document.getElementById('reg-state').value.toUpperCase();

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account...';
      hideMessages();

      try {
        const res = await fetch(API_BASE + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, display_name, city, state, referralCode: localStorage.getItem('safetea_referral_code') || undefined })
        });

        const ct = res.headers.get('content-type') || '';
        if (ct.indexOf('application/json') === -1) {
          throw new Error('Server error — please try again in a moment');
        }

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || data.errors?.[0]?.msg || 'Registration failed');
        }

        localStorage.setItem('safetea_token', data.token);
        localStorage.setItem('safetea_user', JSON.stringify(data.user));

        showSuccess('Account created! Redirecting...');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.innerHTML = '<img src="/images/safetea-logo.svg" alt="" style="height:18px"> Create Account';
}
}

    // ============ FORGOT PASSWORD ============
    function showForgotPassword() {
      document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(f => f.style.display = 'none');
      document.getElementById('forgot-form').style.display = 'block';
      document.getElementById('forgot-form').classList.add('active');
      document.querySelectorAll('.tab-switch button').forEach(b => b.classList.remove('active'));
      hideMessages();
    }
    window.showForgotPassword = showForgotPassword;

    function hideForgotPassword() {
      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('forgot-form').classList.remove('active');
      // Show login and register again
      document.querySelectorAll('.form-section').forEach(f => f.style.display = '');
      switchTab('login');
    }
    window.hideForgotPassword = hideForgotPassword;

    async function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const btn = document.getElementById('forgot-btn');

      if (!email) { showError('Please enter your email'); return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
      hideMessages();

      try {
        const res = await fetch(API_BASE + '/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';

        if (data.success) {
          showSuccess(data.message || 'If an account with that email exists, a reset link has been sent.');
        } else {
          showError(data.error || 'Something went wrong.');
        }
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
        showError('Network error. Please try again.');
      }
    }
    window.handleForgotPassword = handleForgotPassword;

  </script>
</body>
</html>
