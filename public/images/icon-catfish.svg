<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#f27059"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="#22223A" stroke="url(#catGrad)" stroke-width="2"/>
  <!-- Magnifying glass -->
  <circle cx="52" cy="52" r="18" fill="url(#catGrad)" opacity="0.1" stroke="url(#catGrad)" stroke-width="2.5"/>
  <line x1="65" y1="65" x2="82" y2="82" stroke="url(#catGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Face silhouette inside magnifier -->
  <circle cx="52" cy="48" r="6" fill="none" stroke="#f27059" stroke-width="1.5" opacity="0.6"/>
  <path d="M44 60c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#f27059" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Warning badge -->
