    <script>
    (function() {
        'use strict';

        // ==================== ARTICLE DATA ====================
        var articles = [
            {
                id: 'first-date-safety',
                featured: true,
                category: 'safety',
                tag: 'Safety',
                tagClass: 'tag-safety',
                title: 'The Complete First Date Safety Checklist',
                excerpt: 'Going on a first date with someone you met online? Here\'s everything you need to do before, during, and after to stay safe.',
                image: 'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=800&q=80',
                author: 'SafeTea Team',
                date: 'March 20, 2026',
                readTime: '7 min read',
                body: '<h2>Before the Date</h2>' +
                    '<p>Meeting someone for the first time from a dating app is exciting — but it pays to be prepared. Here are the steps every smart dater should take before heading out.</p>' +
                    '<h3>1. Video Chat First</h3>' +
                    '<p>Before meeting in person, have at least one video call. This confirms the person looks like their photos and gives you a sense of their vibe. If they refuse to video chat, that\'s a red flag worth paying attention to.</p>' +
                    '<h3>2. Tell Someone Your Plans</h3>' +
                    '<p>This is where SafeTea\'s Date Check-Out feature comes in. Before you leave, check out through the app — upload a photo of your date, enter where you\'re going, how you\'re getting there, and add your trusted contacts. They\'ll get a SafeTea Report with all the details and a live tracking link.</p>' +
                    '<h3>3. Meet in Public</h3>' +
                    '<p>Always meet at a public place with other people around — a coffee shop, restaurant, or busy bar. Never agree to meet at someone\'s home for a first date, no matter how well the conversation has gone online.</p>' +
                    '<h3>4. Drive Yourself (or Use Your Own Ride)</h3>' +
                    '<p>Maintain your own transportation. If you drive yourself, you can leave whenever you want. If you\'re using a rideshare, don\'t share the ride with your date — you want to be able to leave independently.</p>' +
                    '<h2>During the Date</h2>' +
                    '<h3>5. Watch Your Drink</h3>' +
                    '<p>Never leave your drink unattended. If you go to the bathroom, order a new one when you get back. This isn\'t paranoid — it\'s practical. Drink spiking is more common than most people realize.</p>' +
                    '<h3>6. Trust Your Gut</h3>' +
                    '<p>If something feels off, it probably is. You don\'t owe anyone a "chance" if your instincts are telling you something\'s wrong. It\'s perfectly okay to end a date early.</p>' +
                    '<h3>7. Keep Your Phone Charged</h3>' +
                    '<p>Your phone is your lifeline. Make sure it\'s fully charged before you leave, and consider bringing a portable charger.</p>' +
                    '<h2>After the Date</h2>' +
                    '<h3>8. Check In</h3>' +
                    '<p>Use SafeTea\'s Check-In feature to let your trusted contacts know you\'re home safe. They\'ll get an automatic notification — no awkward group texts required.</p>' +
                    '<h3>9. Don\'t Share Your Address Yet</h3>' +
                    '<p>Even if the date went great, wait before sharing your home address. Meet at the other person\'s place or at a neutral location for the next few dates.</p>' +
                    '<div class="callout"><strong>SafeTea Tip:</strong> Use the Date Check-Out feature every time you go on a date — even if it\'s not a first date. Safety is a habit, not a one-time thing.</div>'
            },
            {
                id: 'catfishing-signs',
                category: 'tips',
                tag: 'Tips',
                tagClass: 'tag-tips',
                title: '8 Signs You\'re Being Catfished (And What to Do About It)',
                excerpt: 'Catfishing is more sophisticated than ever. Learn the red flags that most people miss and how to protect yourself.',
                image: 'https://images.unsplash.com/photo-1563986768609-322da13575f2?w=800&q=80',
                author: 'SafeTea Team',
                date: 'March 17, 2026',
                readTime: '6 min read',
                body: '<p>Catfishing — when someone creates a fake online identity to lure someone into a relationship — is one of the most common dating scams. The FTC reports that romance scams cost Americans over $1.3 billion in a single year. Here are the signs to watch for.</p>' +
                    '<h2>The Red Flags</h2>' +
                    '<h3>1. They Won\'t Video Chat</h3>' +
                    '<p>The single biggest red flag. If someone always has an excuse for why they can\'t video call — bad camera, shy on camera, too busy — be very suspicious. A real person who\'s interested in you will find a way to video chat.</p>' +
                    '<h3>2. Their Photos Look Too Perfect</h3>' +
                    '<p>Stock photo quality images, model-like poses, or photos that all look like they were taken by a professional photographer. Use SafeTea\'s Photo Verification to reverse image search their photos.</p>' +
                    '<h3>3. The Relationship Moves Fast</h3>' +
                    '<p>Catfishers often push for emotional intimacy very quickly. Declarations of love within days, wanting to be exclusive before meeting, or intense emotional conversations before you\'ve had a real date are all warning signs.</p>' +
                    '<h3>4. They Have a Sob Story</h3>' +
                    '<p>A sick relative, a deployment overseas, a business trip that keeps getting extended. These stories create emotional investment and provide excuses for why they can\'t meet.</p>' +
                    '<h3>5. They Ask for Money</h3>' +
                    '<p>This is the endgame for many catfishers. It might start small — help with a phone bill — and escalate to emergency medical costs or travel money to "finally meet you." Never send money to someone you haven\'t met in person.</p>' +
                    '<h3>6. Their Social Media Is Thin</h3>' +
                    '<p>Few friends, recently created account, no tagged photos from other people, no interaction with real friends or family. A real person has a digital footprint that goes back years.</p>' +
                    '<h3>7. They Avoid Specific Questions</h3>' +
                    '<p>Ask about their daily life, job details, where they went to school. Catfishers often give vague answers because they haven\'t built out their fake identity that thoroughly.</p>' +
                    '<h3>8. Your Gut Says Something\'s Off</h3>' +
                    '<p>Trust yourself. If something doesn\'t feel right about this person, pay attention to that feeling. You\'re not being paranoid — you\'re being smart.</p>' +
                    '<h2>What to Do If You Suspect Catfishing</h2>' +
                    '<p>Use SafeTea\'s Photo Verification to reverse image search their photos. And most importantly — insist on a video call before agreeing to meet in person.</p>' +
                    '<div class="callout"><strong>SafeTea Tip:</strong> Drop their profile photo into Photo Verification in the Hub. It\'ll search the web for matching images and analyze the photo for signs of manipulation.</div>'
            },
            {
                id: 'dating-app-privacy',
                category: 'safety',
                tag: 'Safety',
                tagClass: 'tag-safety',
                title: 'How Much Do Dating Apps Really Know About You?',
                excerpt: 'Your dating profile reveals more than you think. Here\'s what data dating apps collect and how to protect your privacy.',
                image: 'https://images.unsplash.com/photo-1555421689-d68471e189f2?w=800&q=80',
                author: 'SafeTea Team',
                date: 'March 14, 2026',
                readTime: '8 min read',
                body: '<p>When you sign up for a dating app, you\'re handing over an enormous amount of personal data. Most people don\'t realize just how much. Here\'s a breakdown of what major dating apps collect.</p>' +
                    '<h2>What They Collect</h2>' +
                    '<p>Beyond the obvious — your photos, name, age, and bio — dating apps typically collect your precise GPS location (often continuously), your device information, browsing habits within the app, message content, contacts list (if you grant access), and behavioral patterns like swipe speed and time spent on profiles.</p>' +
                    '<h2>What They Do With It</h2>' +
                    '<p>This data powers their matching algorithms, but it\'s also used for advertising, shared with third-party analytics companies, and in some cases, sold to data brokers. That\'s right — the intimate details you share to find a date may end up in the hands of companies you\'ve never heard of.</p>' +
                    '<h2>How to Protect Yourself</h2>' +
                    '<h3>Use a Separate Email</h3>' +
                    '<p>Don\'t sign up for dating apps with your primary email. Create a separate one that doesn\'t include your full name.</p>' +
                    '<h3>Limit Location Access</h3>' +
                    '<p>Set location permissions to "While Using" instead of "Always." Better yet, some apps let you manually set your location.</p>' +
                    '<h3>Don\'t Connect Social Media</h3>' +
                    '<p>Avoid linking your Instagram, Spotify, or other social accounts. These connections share more data than you\'d expect.</p>' +
                    '<h3>Use SafeTea\'s Safety Tools</h3>' +
                    '<p>SafeTea provides tools like Photo Verification and Conversation Scanner to help you verify who you\'re talking to before you meet in person.</p>' +
                    '<div class="callout"><strong>SafeTea Tip:</strong> Use our Safety Resource Hub to access trusted external resources like NSOPW, RAINN, and the National Domestic Violence Hotline.</div>'
            },
            {
                id: 'safetea-report-guide',
                category: 'product',
                tag: 'Product',
                tagClass: 'tag-product',
                title: 'Introducing the SafeTea Report: Your Date Safety Card',
                excerpt: 'Every date deserves a safety plan. The SafeTea Report puts your date details in one shareable report for your trusted contacts.',
                image: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&q=80',
                author: 'SafeTea Team',
                date: 'March 24, 2026',
                readTime: '4 min read',
                body: '<p>We built SafeTea because we believe that going on a date shouldn\'t feel like a risk. Today we\'re introducing the SafeTea Report — a shareable safety card that puts all your date details in one place.</p>' +
                    '<h2>How It Works</h2>' +
                    '<p>Before your date, open the Hub and go to Date Check. Fill in four key details:</p>' +
                    '<ul>' +
                    '<li><strong>Upload a photo</strong> of the person you\'re meeting</li>' +
                    '<li><strong>Where</strong> the date will be (venue name and address)</li>' +
                    '<li><strong>How you\'re getting there</strong> (driving, rideshare, transit, etc.)</li>' +
                    '<li><strong>Your trusted contacts</strong> who should know your plans</li>' +
                    '</ul>' +
                    '<p>Hit "Check Out" and SafeTea generates your report instantly. It\'s a clean, branded safety card with all the details — including a live tracking link your contacts can check anytime.</p>' +
                    '<h2>Two Ways to Share</h2>' +
                    '<p>Your SafeTea Report can be shared via SMS (we send a text message with all the details) or through the SafeTea inbox (to other SafeTea users). Your trusted contacts also get the report automatically when you check out.</p>' +
                    '<h2>After the Date</h2>' +
                    '<p>Tap "Check In — I\'m Safe" and everyone who got your report gets an instant update. No group texts, no awkward check-in calls. Just a quick tap and peace of mind for everyone.</p>' +
                    '<div class="callout"><strong>Get started:</strong> Open the SafeTea app, go to Hub > Date Check, and try your first check-out. It takes about 60 seconds to fill out and could make all the difference.</div>'
            },
            {
                id: 'share-location-guide',
                category: 'tips',
                tag: 'Tips',
                tagClass: 'tag-tips',
                title: 'How to Share Your Location Without Being Creepy About It',
                excerpt: 'Sharing your location with friends before a date is smart. Here\'s how to bring it up naturally and why it matters.',
                image: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80',

        // ==================== RENDER ====================
        var currentCategory = 'all';

        function renderArticles(category) {
            currentCategory = category || 'all';
            var grid = document.getElementById('blog-grid');
            var filtered = category === 'all' ? articles : articles.filter(function(a) { return a.category === category; });

            var html = '';
            filtered.forEach(function(article, i) {
                if (i === 0 && category === 'all' && article.featured) {
                    // Featured article
                    html += '<div class="blog-featured" onclick="openArticle(\'' + article.id + '\')">' +
                        '<div class="blog-featured-img" style="background-image:url(\'' + article.image + '\')"></div>' +
                        '<div class="blog-featured-content">' +
                            '<span class="blog-tag ' + article.tagClass + '">' + article.tag + '</span>' +
                            '<h2>' + article.title + '</h2>' +
                            '<p>' + article.excerpt + '</p>' +
                            '<div style="display:flex;align-items:center;gap:12px">' +
                                '<div class="blog-card-author"><div class="blog-card-author-avatar">S</div><span>' + article.author + '</span></div>' +
                                '<span style="color:#8080A0;font-size:12px">' + article.date + '</span>' +
                                '<span style="color:#8080A0;font-size:12px">' + article.readTime + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                } else {
                    html += '<div class="blog-card" onclick="openArticle(\'' + article.id + '\')" data-category="' + article.category + '">' +
                        '<div class="blog-card-img" style="background-image:url(\'' + article.image + '\')"></div>' +
                        '<div class="blog-card-body">' +
                            '<span class="blog-tag ' + article.tagClass + '">' + article.tag + '</span>' +
                            '<h3>' + article.title + '</h3>' +
                            '<p>' + article.excerpt + '</p>' +
                            '<div class="blog-card-meta">' +
                                '<div class="blog-card-author"><div class="blog-card-author-avatar">S</div><span>' + article.author + '</span></div>' +
                                '<span class="blog-card-date">' + article.date + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }
            });

            if (filtered.length === 0) {
                html = '<div style="text-align:center;padding:40px;color:#8080A0;grid-column:1/-1"><i class="fas fa-newspaper" style="font-size:32px;display:block;margin-bottom:12px"></i><p>No articles in this category yet.</p></div>';
            }

            grid.innerHTML = html;
        }

        window.filterCategory = function(category) {
            document.querySelectorAll('.blog-filter').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.blog-nav-links a').forEach(function(a) { a.classList.remove('active'); });

            // Activate filter button
            document.querySelectorAll('.blog-filter').forEach(function(b) {
                if (b.textContent.trim().toLowerCase().replace(/[^a-z]/g, '') === category || (category === 'all' && b.textContent.trim() === 'All')) {
                    b.classList.add('active');
                }
            });

            renderArticles(category);
        };

        window.openArticle = function(id) {
            var article = articles.find(function(a) { return a.id === id; });
            if (!article) return;

            var container = document.getElementById('blog-article-content');
            container.innerHTML =
                '<div class="blog-article-header">' +
                    '<span class="blog-tag ' + article.tagClass + '">' + article.tag + '</span>' +
                    '<h1>' + article.title + '</h1>' +
                    '<div class="blog-article-meta">' +
                        '<span><i class="fas fa-user"></i> ' + article.author + '</span>' +
                        '<span><i class="fas fa-calendar"></i> ' + article.date + '</span>' +
                        '<span><i class="fas fa-clock"></i> ' + article.readTime + '</span>' +
                    '</div>' +
                '</div>' +
                '<img class="blog-article-hero-img" src="' + article.image + '" alt="' + article.title + '" onerror="this.style.display=\'none\'">' +
                '<div class="blog-article-body">' + article.body + '</div>';

            document.getElementById('blog-list').style.display = 'none';
            document.getElementById('blog-article').classList.add('active');
            window.scrollTo(0, 0);
        };

        window.closeArticle = function() {
            document.getElementById('blog-article').classList.remove('active');
            document.getElementById('blog-list').style.display = 'block';
            window.scrollTo(0, 0);
        };

        // ==================== INIT ====================
        renderArticles('all');

        // Handle URL hash for direct article links
        if (window.location.hash) {
            var articleId = window.location.hash.substring(1);
            var found = articles.find(function(a) { return a.id === articleId; });
            if (found) openArticle(articleId);
        }
    })();
    </script>
