name: Mobile Build (iOS + Android)

# Builds the SafeTea Capacitor 7 shell for iOS and Android.
# - iOS job runs on GitHub's macos-15 runner with Xcode 26 (ITMS-90725 compliant).
# - Android job runs on ubuntu-latest with JDK 21 + Android SDK 35
#   (JDK 21 required because Capacitor 7.6+ compiles with VERSION_21).
# - If all signing secrets are present, builds are signed and uploaded to
#   TestFlight / Play Console Internal Testing.
# - If signing secrets are missing, jobs still run and upload unsigned build
#   artifacts to the workflow so you can download and inspect them.
#
# Triggers:
#   - push to mobile-capacitor or main (always builds, uploads only on main)
#   - manual dispatch from Actions tab (opt-in upload via input)
#
# Secrets required for upload — see .github/workflows/SECRETS.md
#
# The One Rule: this workflow NEVER modifies capacitor.config.json, www/, or
# anything in public/. It only generates native projects (ios/, android/) in
# the runner, wires signing, and uploads. The app always loads
# https://getsafetea.app so mobile = web, permanently.

on:
  push:
    branches: [main, mobile-capacitor]
    paths:
      - 'safetea-capacitor/**'
      - '.github/workflows/mobile-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'safetea-capacitor/**'
      - '.github/workflows/mobile-build.yml'
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload signed builds to TestFlight / Play Console'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  ios:
    name: iOS (TestFlight)
    runs-on: macos-15
    timeout-minutes: 60
    defaults:
      run:
        working-directory: safetea-capacitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(cat VERSION | tr -d '[:space:]')
          BUILD_NUMBER=$((1000 + ${{ github.run_number }}))
          echo "name=$VERSION_NAME"   >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "iOS build will be $VERSION_NAME ($BUILD_NUMBER)"

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Xcode version
        shell: bash
        run: |
          xcodebuild -version
          XCV=$(xcodebuild -version | head -1 | awk '{print $2}')
          MAJOR=${XCV%%.*}
          if [[ "$MAJOR" -lt 26 ]]; then
            echo "::warning::Xcode $XCV is older than 26.x — ITMS-90725 requires Xcode 26 for submissions after 2026-04-28"
          else
            echo "Xcode $XCV — ITMS-90725 compliant"
          fi

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: safetea-capacitor/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Add iOS platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Set iOS metadata (Info.plist + version)
        shell: bash
        run: |
          chmod +x scripts/set-ios-metadata.sh
          ./scripts/set-ios-metadata.sh \
            "${{ steps.version.outputs.name }}" \
            "${{ steps.version.outputs.build }}"

      - name: Check iOS signing secrets
        id: ios_secrets
        shell: bash
        env:
          API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY:       ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          TEAM_ID:       ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$API_KEY_ID" && -n "$API_ISSUER_ID" && -n "$API_KEY" && -n "$TEAM_ID" ]]; then
            echo "has_signing=true"  >> "$GITHUB_OUTPUT"
            echo "iOS signing secrets: present — will sign and archive"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::iOS signing secrets missing — unsigned build only (no TestFlight upload). See .github/workflows/SECRETS.md"
          fi

      - name: Install App Store Connect API key
        if: steps.ios_secrets.outputs.has_signing == 'true'
        shell: bash
        env:
          API_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          # API_KEY_CONTENT is base64-encoded .p8 file contents — decode to PEM
          printf '%s' "$API_KEY_CONTENT" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          printf '%s' "$API_KEY_CONTENT" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 "$RUNNER_TEMP/AuthKey.p8"
          # Sanity check decode without printing contents
          head -1 "$RUNNER_TEMP/AuthKey.p8" | grep -q "BEGIN PRIVATE KEY" \
            || { echo "::error::Decoded APP_STORE_CONNECT_API_KEY_CONTENT is not a valid PEM private key"; exit 1; }
          echo "App Store Connect API key installed"

      - name: Build Fastlane API key JSON
        if: steps.ios_secrets.outputs.has_signing == 'true'
        shell: bash
        env:
          API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          # Fastlane uses a JSON file with key_id, issuer_id, and the PEM
          # contents of the .p8 (with literal newlines escaped). The .p8 is
          # already decoded into $RUNNER_TEMP/AuthKey.p8 from the earlier
          # "Install App Store Connect API key" step.
          KEY_PEM=$(cat "$RUNNER_TEMP/AuthKey.p8")
          jq -n \
            --arg key_id    "$API_KEY_ID" \
            --arg issuer_id "$API_ISSUER_ID" \
            --arg key       "$KEY_PEM" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false, is_key_content_base64: false}' \
            > "$RUNNER_TEMP/api_key.json"
          chmod 600 "$RUNNER_TEMP/api_key.json"
          jq -e 'has("key_id") and has("issuer_id") and has("key")' "$RUNNER_TEMP/api_key.json" > /dev/null
          echo "Fastlane API key JSON ready at \$RUNNER_TEMP/api_key.json"

      - name: Setup CI keychain (Fastlane setup_ci)
        if: steps.ios_secrets.outputs.has_signing == 'true'
        shell: bash
        run: |
          # Creates a fresh temporary keychain, unlocks it, and makes it the
          # default — required so cert / sigh can install certificates and
          # profiles without password prompts.
          fastlane run setup_ci force:true

      - name: Create Apple Distribution certificate (Fastlane cert)
        if: steps.ios_secrets.outputs.has_signing == 'true'
        shell: bash
        env:
          API_KEY_PATH: ${{ runner.temp }}/api_key.json
        run: |
          mkdir -p "$RUNNER_TEMP/cert"
          # cert downloads the team's Apple Distribution cert from the API,
          # creating a new one if none exists, and installs the .p12 into the
          # default keychain (the temp one created by setup_ci above).
          fastlane run cert \
            api_key_path:"$API_KEY_PATH" \
            development:false \
            generate_apple_certs:true \
            output_path:"$RUNNER_TEMP/cert"

      - name: Create App Store provisioning profile (Fastlane sigh)
        if: steps.ios_secrets.outputs.has_signing == 'true'
        id: sigh
        shell: bash
        env:
          API_KEY_PATH: ${{ runner.temp }}/api_key.json
          TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          # sigh creates the App Store distribution profile for the bundle ID
          # via the App Store Connect API, registering the App ID first if it
          # doesn't exist. Downloads the .mobileprovision and auto-installs
          # it into ~/Library/MobileDevice/Provisioning Profiles/.
          fastlane run get_provisioning_profile \
            api_key_path:"$API_KEY_PATH" \
            app_identifier:"app.getsafetea.mobile" \
            team_id:"$TEAM_ID" \
            development:false \
            force:true \
            output_path:"$RUNNER_TEMP" \
            filename:"AppStore_safetea.mobileprovision"
          PROFILE_PATH="$RUNNER_TEMP/AppStore_safetea.mobileprovision"
          # Extract profile Name + UUID for the project.pbxproj patch
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_PATH")
          PROFILE_NAME=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          PROFILE_UUID=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "Provisioning profile: $PROFILE_NAME (UUID: $PROFILE_UUID)"

      - name: Patch App target with manual signing + downloaded profile
        if: steps.ios_secrets.outputs.has_signing == 'true'
        working-directory: safetea-capacitor/ios/App
        shell: bash
        env:
          TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.sigh.outputs.profile_name }}
        run: |
          # Now that the cert + profile exist locally, surgically patch only
          # the App target's Release config in App.xcodeproj/project.pbxproj
          # to use Manual signing with the exact profile we just downloaded.
          # Pod targets remain on automatic dev signing (untouched).
          gem install --no-document xcodeproj
          ruby <<'RUBY'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          app_target = project.targets.find { |t| t.name == 'App' } \
            or raise "App target not found"
          team_id      = ENV.fetch('TEAM_ID')
          profile_name = ENV.fetch('PROFILE_NAME')
          app_target.build_configurations.each do |config|
            next unless config.name == 'Release'
            config.build_settings['CODE_SIGN_STYLE']                       = 'Manual'
            config.build_settings['CODE_SIGN_IDENTITY']                    = 'Apple Distribution'
            config.build_settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]']     = 'Apple Distribution'
            config.build_settings['DEVELOPMENT_TEAM']                      = team_id
            config.build_settings['DEVELOPMENT_TEAM[sdk=iphoneos*]']       = team_id
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER']             = 'app.getsafetea.mobile'
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER']        = profile_name
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]'] = profile_name
            puts "Patched App target Release: Manual / Apple Distribution / #{profile_name}"
          end
          attrs = project.root_object.attributes['TargetAttributes'] ||= {}
          (attrs[app_target.uuid] ||= {})['ProvisioningStyle'] = 'Manual'
          project.save
          RUBY

      - name: Archive signed build
        if: steps.ios_secrets.outputs.has_signing == 'true'
        working-directory: safetea-capacitor/ios/App
        shell: bash
        run: |
          set -o pipefail
          # Manual signing with the locally-installed profile and cert from
          # the previous Fastlane steps. No -allowProvisioningUpdates needed
          # because nothing needs to be created — the profile is already on
          # disk and the cert is already in the keychain.
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            archive

      - name: Export .ipa
        if: steps.ios_secrets.outputs.has_signing == 'true'
        working-directory: safetea-capacitor/ios/App
        shell: bash
        env:
          TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.sigh.outputs.profile_name }}
        run: |
          # Build ExportOptions.plist at runtime with team ID and the
          # downloaded provisioning profile name. Manual signing on export.
          EXPORT_OPTS="$RUNNER_TEMP/ExportOptions.plist"
          cp ../../ExportOptions.plist "$EXPORT_OPTS"
          PB="/usr/libexec/PlistBuddy"
          $PB -c "Delete :teamID" "$EXPORT_OPTS" 2>/dev/null || true
          $PB -c "Add :teamID string $TEAM_ID" "$EXPORT_OPTS"
          $PB -c "Delete :signingStyle" "$EXPORT_OPTS" 2>/dev/null || true
          $PB -c "Add :signingStyle string manual" "$EXPORT_OPTS"
          $PB -c "Delete :signingCertificate" "$EXPORT_OPTS" 2>/dev/null || true
          $PB -c "Add :signingCertificate string Apple Distribution" "$EXPORT_OPTS"
          $PB -c "Delete :provisioningProfiles" "$EXPORT_OPTS" 2>/dev/null || true
          $PB -c "Add :provisioningProfiles dict" "$EXPORT_OPTS"
          $PB -c "Add :provisioningProfiles:app.getsafetea.mobile string $PROFILE_NAME" "$EXPORT_OPTS"

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$EXPORT_OPTS"

          ls -la "$RUNNER_TEMP/export"

      - name: Unsigned build attempt (no secrets)
        if: steps.ios_secrets.outputs.has_signing == 'false'
        working-directory: safetea-capacitor/ios/App
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            PROVISIONING_PROFILE_SPECIFIER= \
            PRODUCT_BUNDLE_IDENTIFIER=app.getsafetea.mobile \
            archive
          echo "::notice::Unsigned archive produced — add signing secrets to upload to TestFlight"

      - name: Upload iOS build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safetea-ios-${{ steps.version.outputs.build }}
          path: |
            ${{ runner.temp }}/export/*.ipa
            ${{ runner.temp }}/App.xcarchive
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to TestFlight
        if: >-
          steps.ios_secrets.outputs.has_signing == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && inputs.upload == 'true') ||
            github.ref == 'refs/heads/main'
          )
        shell: bash
        env:
          API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          IPA=$(ls "$RUNNER_TEMP/export/"*.ipa 2>/dev/null | head -1)
          if [[ -z "$IPA" ]]; then
            echo "::error::No .ipa found in $RUNNER_TEMP/export/"
            exit 1
          fi
          echo "Uploading $IPA to TestFlight…"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"
          echo "✅ Uploaded to App Store Connect — processing begins (usually 5–30 min until TestFlight shows the build)"

  # ---------------------------------------------------------------------------
  android:
    name: Android (Play Console)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: safetea-capacitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(cat VERSION | tr -d '[:space:]')
          # EAS builds ended at versionCode 22 — start Capacitor at 1001 to stay monotonically ahead
          VERSION_CODE=$((1000 + ${{ github.run_number }}))
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Android build will be $VERSION_NAME ($VERSION_CODE)"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: safetea-capacitor/package-lock.json

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Install JS dependencies
        run: npm ci

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Set Android version (build.gradle)
        shell: bash
        run: |
          chmod +x scripts/set-android-version.sh
          ./scripts/set-android-version.sh \
            "${{ steps.version.outputs.name }}" \
            "${{ steps.version.outputs.code }}"

      - name: Check Android signing secrets
        id: android_secrets
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PW:  ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:    ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW:       ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_B64" && -n "$KEYSTORE_PW" && -n "$KEY_ALIAS" && -n "$KEY_PW" ]]; then
            echo "has_signing=true"  >> "$GITHUB_OUTPUT"
            echo "Android signing secrets: present — will sign release .aab"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Android signing secrets missing — will produce unsigned debug .apk only (cannot upload to Play Console). See .github/workflows/SECRETS.md"
          fi

      - name: Check Play Console secrets
        id: play_secrets
        shell: bash
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -n "$PLAY_JSON" ]]; then
            echo "has_play=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_play=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore
        if: steps.android_secrets.outputs.has_signing == 'true'
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          if [[ ! -s android/app/upload-keystore.jks ]]; then
            echo "::error::Keystore decode produced empty file — check ANDROID_KEYSTORE_BASE64 secret encoding"
            exit 1
          fi
          echo "Keystore decoded ($(wc -c < android/app/upload-keystore.jks) bytes)"

      - name: Write keystore.properties
        if: steps.android_secrets.outputs.has_signing == 'true'
        shell: bash
        env:
          KEYSTORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:   ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PW
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PW
          EOF
          # Do not print the file contents — they contain the password

      - name: Inject signing config into build.gradle
        if: steps.android_secrets.outputs.has_signing == 'true'
        shell: bash
        run: |
          chmod +x scripts/inject-android-signing.sh
          ./scripts/inject-android-signing.sh

      - name: Build signed release .aab
        if: steps.android_secrets.outputs.has_signing == 'true'
        working-directory: safetea-capacitor/android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace
          echo "--- Build outputs ---"
          find app/build/outputs/bundle/release -type f -name "*.aab" -exec ls -la {} \;

      - name: Build unsigned debug .apk (no secrets)
        if: steps.android_secrets.outputs.has_signing == 'false'
        working-directory: safetea-capacitor/android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "::notice::Unsigned debug APK produced — add signing secrets to build a Play-submittable .aab"
          find app/build/outputs/apk/debug -type f -name "*.apk" -exec ls -la {} \;

      - name: Upload Android build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safetea-android-${{ steps.version.outputs.code }}
          path: |
            safetea-capacitor/android/app/build/outputs/bundle/release/*.aab
            safetea-capacitor/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to Play Console Internal Testing
        if: >-
          steps.android_secrets.outputs.has_signing == 'true' &&
          steps.play_secrets.outputs.has_play == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && inputs.upload == 'true') ||
            github.ref == 'refs/heads/main'
          )
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.getsafetea.mobile
          releaseFiles: safetea-capacitor/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          inAppUpdatePriority: 2
          whatsNewDirectory: safetea-capacitor/fastlane/metadata/android
